<!DOCTYPE html>
<html>
<head>
    <title>Contact Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial; background:#f2f4f8; margin:0; }
        .container { max-width:900px; margin:auto; padding:15px; }

        .card {
            background:white; padding:15px; margin-bottom:20px;
            border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width:100%; padding:10px; margin:5px 0;
            border-radius:5px; border:1px solid #ccc;
        }

        button {
            width:100%; padding:10px; background:#007bff;
            color:white; border:none; border-radius:5px;
        }

        .contact {
            border-bottom:1px solid #ddd; padding:10px 0;
        }

        .name { font-weight:bold; }

        .btn {
            padding:5px 10px; border-radius:5px;
            color:white; text-decoration:none;
        }

        .edit { background:orange; }
        .delete { background:red; }
    </style>
</head>

<body>
<div class="container">

    <!-- ADD -->
    <div class="card">
        <h2>Add Contact</h2>
        <form method="POST" action="/add" onsubmit="return validateForm()">
            <input name="first_name" placeholder="First Name" required>
            <input name="last_name" placeholder="Last Name" required>
            <input name="address" placeholder="Address" required>
            <input id="email" name="email" placeholder="Email" required>
            <input id="phone" name="phone" placeholder="Phone" required>
            <button>Add Contact</button>
        </form>
    </div>

    <!-- LIST -->
    <div class="card">
        <h2>Contact List</h2>

        {% for c in contacts %}
        <div class="contact">
            <div class="name">{{c["first_name"]}} {{c["last_name"]}}</div>
            <div>{{c["address"]}}</div>
            <div>{{c["email"]}}</div>
            <div>{{c["phone"]}}</div>

            <a href="/edit/{{c['id']}}" class="btn edit">Edit</a>
            <a href="/delete/{{c['id']}}" class="btn delete">Delete</a>
        </div>
        {% endfor %}

    </div>

</div>

<script>
function validateForm() {
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    let phonePattern = /^[0-9]{10}$/;

    if (!email.match(emailPattern)) {
        alert("Invalid Email");
        return false;
    }

    if (!phone.match(phonePattern)) {
        alert("Phone must be 10 digits");
        return false;
    }

    return true;
}
</script>

</body>
</html>
